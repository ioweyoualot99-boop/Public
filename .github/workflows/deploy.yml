name: Deploy CV

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.3.219.20
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /tmp
            rm -rf Public
            git clone https://github.com/ioweyoualot99-boop/Public.git
            cp -r Public/* /var/www/cv/
            rm -rf Public
